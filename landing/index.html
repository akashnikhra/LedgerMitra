<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LedgerMitra — Offline Desktop Accounting</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #201d1d;
      --ink-deep: #0f0000;
      --body: #424245;
      --mute: #646262;
      --ash: #9a9898;
      --canvas: #fdfcfc;
      --surface-soft: #f8f7f7;
      --surface-card: #f1eeee;
      --surface-dark: #201d1d;
      --surface-dark-elevated: #302c2c;
      --hairline: rgba(15, 0, 0, 0.12);
      --hairline-strong: #646262;
      --on-dark: #fdfcfc;
      --on-dark-mute: #9a9898;
      --accent: #007aff;
      --font: 'JetBrains Mono', 'IBM Plex Mono', ui-monospace, monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font);
      background: var(--canvas);
      color: var(--body);
      font-size: 16px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; text-decoration: none; }
    img { max-width: 100%; display: block; }
    .container { max-width: 960px; margin: 0 auto; padding: 0 24px; }
    pre { font-family: var(--font); }

    .nav {
      position: sticky; top: 0; z-index: 10;
      background: var(--canvas);
      border-bottom: 1px solid var(--hairline);
      height: 56px;
    }
    .nav .container {
      display: flex; align-items: center; justify-content: space-between;
      height: 100%;
    }
    .nav-links { display: flex; gap: 24px; align-items: center; }
    .nav-links a { color: var(--body); font-size: 14px; transition: color 0.2s; cursor: pointer; }
    .nav-links a:hover { color: var(--ink); }
    .btn-dark {
      display: inline-flex; align-items: center; gap: 6px;
      height: 36px; padding: 4px 20px;
      background: var(--ink); color: var(--on-dark);
      border-radius: 4px; font-family: var(--font);
      font-size: 14px; font-weight: 500;
      border: none; cursor: pointer; transition: background 0.2s;
    }
    .btn-dark:hover { background: var(--ink-deep); }
    .btn-outline {
      display: inline-flex; align-items: center;
      height: 36px; padding: 4px 20px;
      background: transparent; color: var(--ink);
      border: 1px solid var(--hairline-strong);
      border-radius: 4px; font-family: var(--font);
      font-size: 14px; font-weight: 500;
      cursor: pointer; transition: background 0.2s;
    }
    .btn-outline:hover { background: var(--surface-soft); }
    .ascii-wordmark {
      font-family: var(--font); font-size: 14px; font-weight: 700;
      letter-spacing: 4px; line-height: 1.2; color: var(--ink);
      white-space: pre;
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="container">
      <pre class="ascii-wordmark">
┌─┐┬  ┌─┐┬ ┬┌─┐┌┬┐┌─┐┌┬┐┬┌─┐┌┐┌
│  │  ├┤ │││└─┐ ││├─┤ │ ││ ││││
└─┘┴─┘└─┘└┴┘└─┘─┴┘┴ ┴ ┴ ┴└─┘┘└┘
      </pre>
      <div class="nav-links">
        <a href="#features">Features</a>
        <a href="#migration">Migration</a>
        <a href="#quickstart">Quick Start</a>

          GitHub

      </div>
    </div>
  </nav>
</body>
</html>
